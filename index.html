<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色介紹 - 艾莉亞</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .main-display {
            display: flex;
            padding: 40px;
            gap: 40px;
            align-items: flex-start;
        }

        .character-image-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .character-image {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 500px;
            position: relative;
            margin-bottom: 30px;
        }

        .character-image img {
            max-width: 100%;
            max-height: 600px;
            object-fit: contain;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.2));
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .character-image img.fade-out {
            opacity: 0;
            transform: scale(0.95);
        }

        .pose-selector {
            width: 100%;
            max-width: 400px;
        }

        .pose-title {
            text-align: center;
            font-size: 1.1em;
            color: #667eea;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .pose-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 12px;
        }

        .pose-thumbnail {
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s ease;
            background: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .pose-thumbnail:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .pose-thumbnail.active {
            border-color: #667eea;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
            transform: scale(1.08);
        }

        .pose-thumbnail.active::after {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 5px;
            background: #667eea;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .pose-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pose-label {
            text-align: center;
            margin-top: 5px;
            font-size: 0.85em;
            color: #666;
            font-weight: 500;
        }

        .pose-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .character-info {
            flex: 1;
            padding: 20px;
        }

        .character-info h2 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
        }

        .character-info .role {
            font-size: 1.2em;
            color: #764ba2;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .character-info .description {
            font-size: 1.1em;
            line-height: 1.8;
            color: #555;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 30px;
        }

        .stat-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .stat-label {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        @media (max-width: 968px) {
            .main-display {
                flex-direction: column;
                padding: 20px;
            }

            .character-image {
                min-height: 300px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⭐ 角色介紹 ⭐</h1>
        </div>

        <div class="main-display">
            <!-- 左側：立繪 + 姿勢選擇器 -->
            <div class="character-image-section">
                <div class="character-image">
                    <img id="mainCharacterImage" src="https://via.placeholder.com/400x600/667eea/ffffff?text=預設立繪" alt="角色立繪">
                </div>

                <div class="pose-selector">
                    <div class="pose-title">💫 選擇立繪姿勢</div>
                    <div class="pose-buttons" id="poseButtons">
                        <!-- 姿勢按鈕會由 JavaScript 動態生成 -->
                    </div>
                </div>
            </div>

            <!-- 右側：角色資訊（固定不變） -->
            <div class="character-info">
                <h2>艾莉亞</h2>
                <div class="role">主角 - 魔法劍士</div>
                <div class="description">
                    一位擁有強大魔法力量的年輕劍士，在追尋真理的旅途中不斷成長。她的劍術與魔法完美結合，是隊伍中不可或缺的核心戰力。
                    <br><br>
                    性格開朗活潑，對朋友十分忠誠。雖然年紀輕輕，但在戰鬥中展現出驚人的冷靜和判斷力。她的目標是成為最強的魔法劍士，守護重要的人。
                </div>

                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-label">年齡</div>
                        <div class="stat-value">18歲</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">身高</div>
                        <div class="stat-value">165cm</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">武器</div>
                        <div class="stat-value">魔導劍</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">屬性</div>
                        <div class="stat-value">光 / 雷</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">聲優</div>
                        <div class="stat-value">花澤香菜</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">生日</div>
                        <div class="stat-value">3月15日</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 定義角色的不同立繪姿勢
        const characterPoses = [
            {
                id: 1,
                name: '預設',
                label: '預設姿勢',
                fullImage: 'https://via.placeholder.com/400x600/667eea/ffffff?text=預設立繪',
                thumbnail: 'https://via.placeholder.com/100x100/667eea/ffffff?text=預設'
            },
            {
                id: 2,
                name: '戰鬥',
                label: '戰鬥姿態',
                fullImage: 'https://via.placeholder.com/400x600/e74c3c/ffffff?text=戰鬥立繪',
                thumbnail: 'https://via.placeholder.com/100x100/e74c3c/ffffff?text=戰鬥'
            },
            {
                id: 3,
                name: '微笑',
                label: '微笑表情',
                fullImage: 'https://via.placeholder.com/400x600/f39c12/ffffff?text=微笑立繪',
                thumbnail: 'https://via.placeholder.com/100x100/f39c12/ffffff?text=微笑'
            },
            {
                id: 4,
                name: '認真',
                label: '認真模式',
                fullImage: 'https://via.placeholder.com/400x600/9b59b6/ffffff?text=認真立繪',
                thumbnail: 'https://via.placeholder.com/100x100/9b59b6/ffffff?text=認真'
            },
            {
                id: 5,
                name: '受傷',
                label: '受傷狀態',
                fullImage: 'https://via.placeholder.com/400x600/95a5a6/ffffff?text=受傷立繪',
                thumbnail: 'https://via.placeholder.com/100x100/95a5a6/ffffff?text=受傷'
            },
            {
                id: 6,
                name: '勝利',
                label: '勝利姿勢',
                fullImage: 'https://via.placeholder.com/400x600/2ecc71/ffffff?text=勝利立繪',
                thumbnail: 'https://via.placeholder.com/100x100/2ecc71/ffffff?text=勝利'
            }
        ];

        // 生成姿勢選擇按鈕
        function generatePoseButtons() {
            const container = document.getElementById('poseButtons');
            container.innerHTML = '';
            
            characterPoses.forEach((pose, index) => {
                const poseItem = document.createElement('div');
                poseItem.className = 'pose-item';
                
                const thumbnail = document.createElement('div');
                thumbnail.className = 'pose-thumbnail' + (index === 0 ? ' active' : '');
                thumbnail.onclick = () => switchPose(pose.id);
                
                const img = document.createElement('img');
                img.src = pose.thumbnail;
                img.alt = pose.label;
                
                const label = document.createElement('div');
                label.className = 'pose-label';
                label.textContent = pose.name;
                
                thumbnail.appendChild(img);
                poseItem.appendChild(thumbnail);
                poseItem.appendChild(label);
                container.appendChild(poseItem);
            });
        }

        // 切換立繪姿勢（資訊不變）
        function switchPose(poseId) {
            const pose = characterPoses.find(p => p.id === poseId);
            if (!pose) return;

            // 立繪淡出效果
            const mainImage = document.getElementById('mainCharacterImage');
            mainImage.classList.add('fade-out');

            // 更新活動按鈕
            document.querySelectorAll('.pose-thumbnail').forEach((thumb, index) => {
                thumb.classList.toggle('active', characterPoses[index].id === poseId);
            });

            // 等待淡出動畫完成後更新立繪
            setTimeout(() => {
                mainImage.src = pose.fullImage;
                mainImage.alt = pose.label;
                mainImage.classList.remove('fade-out');
            }, 300);
        }

        // 初始化
        generatePoseButtons();
    </script>
</body>
</html>
